<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團隊問卷調查</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff8f5;
    min-height: 100vh;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #d47b7b;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 2px;
  }

  .survey-card {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin-bottom: 28px;
    border-radius: 20px;
    overflow: visible;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .survey-card img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 20px;
  }

  .text-overlay {
    position: absolute;
    background: rgba(255,255,255,0.01);
    border: none;
    outline: none;
    resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    color: #4a3f3f;
    line-height: 1.6;
    padding: 10px 14px;
    cursor: text;
    box-sizing: border-box;
  }

  .text-overlay::placeholder {
    color: #c9b0b0;
    font-size: 13px;
  }

  .text-overlay:focus {
    background: rgba(255,235,235,0.5);
    border-radius: 10px;
    outline: none;
  }

  /* Q1: 粉色虛線框，在圖片下半部偏左 */
  #q1-box { top: 20%; left: 5%; width: 82%; height: 38%; }

  /* Q2: 藍色虛線框，中間偏上 */
  #q2-box { top: 32%; left: 5%; width: 82%; height: 38%; }

  /* Q3: 橘色虛線框，中間 */
  #q3-box { top: 32%; left: 5%; width: 82%; height: 38%; }

  /* Q4: 藍色虛線框，中間 */
  #q4-box { top: 32%; left: 5%; width: 82%; height: 38%; }

  /* Q5: 粉色虛線框，上方 */
  #q5-box { top: 32%; left: 5%; width: 82%; height: 38%; }

  .btn-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.download-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.download-btn:active {
    transform: scale(0.97);
  }

  .hint {
    font-size: 13px;
    color: #b08080;
    text-align: center;
    margin-bottom: 20px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.submit-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.submit-btn:active { transform: scale(0.97); }

  .success-msg {
    display: none;
    background: #fff0f5;
    border: 1.5px solid #f5a0a0;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 14px;
    color: #c06060;
    text-align: center;
    max-width: 420px;
  }
</style>
</head>
<body>

<h1>✨ 團隊問卷調查 ✨</h1>
<p class="hint">請在每張圖片的空白框內填寫你的答案，完成後按下載儲存 ♡</p>

<!-- Q1 -->
<div class="survey-card" id="card1">
  <img src="S__96526360_0.jpg" alt="問題1：最近最喜歡做的工作內容是什麼？">
  <textarea id="q1-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q2 -->
<div class="survey-card" id="card2">
  <img src="S__96526359_0.jpg" alt="問題2：有沒有什麼事情是你想嘗試的？">
  <textarea id="q2-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q3 -->
<div class="survey-card" id="card3">
  <img src="S__96526358_0.jpg" alt="問題3：有沒有什麼技能是你想培養的？">
  <textarea id="q3-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q4 -->
<div class="survey-card" id="card4">
  <img src="S__96526357_0.jpg" alt="問題4：工作上目前有沒有卡關或需要協助的地方？">
  <textarea id="q4-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q5 -->
<div class="survey-card" id="card5">
  <img src="S__96526356_0.jpg" alt="問題5：還有什麼想跟我分享的？">
  <textarea id="q5-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Thank you image (no input needed) -->
<div class="survey-card" id="card6">
  <img src="S__96526355_0.jpg" alt="謝謝你的分享！">
</div>

<iframe name="hidden-iframe" style="display:none;"></iframe>

<div class="btn-group">
  <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">📨 送出問卷</button>
  <div class="success-msg" id="success-msg">🎉 答案已成功送出到 Google 試算表！謝謝你的分享 ♡</div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwSrns-RoVPvi7_VrwFgq6rC89GxXm0wCMsqxv0cFtoH3z0MMF-p4THY5Er02Th0eYowg/exec';

// [top%, left%, width%, height%] relative to image dimensions
const BOX_CONFIG = {
  'q1-box': [47, 5, 58, 38],
  'q2-box': [32, 5, 82, 38],
  'q3-box': [32, 5, 72, 38],
  'q4-box': [32, 5, 82, 42],
  'q5-box': [18, 5, 85, 38],
};

function positionBoxes() {
  Object.entries(BOX_CONFIG).forEach(([id, [top, left, width, height]]) => {
    const ta = document.getElementById(id);
    if (!ta) return;
    const img = ta.closest('.survey-card').querySelector('img');
    const h = img.offsetHeight;
    const w = img.offsetWidth;
    ta.style.top    = (h * top / 100) + 'px';
    ta.style.left   = (w * left / 100) + 'px';
    ta.style.width  = (w * width / 100) + 'px';
    ta.style.height = (h * height / 100) + 'px';
  });
}

window.addEventListener('load', positionBoxes);
window.addEventListener('resize', positionBoxes);

function submitSurvey() {
  const btn = document.getElementById('submit-btn');
  const successMsg = document.getElementById('success-msg');

  const vals = [
    document.getElementById('q1-box').value || '（未填寫）',
    document.getElementById('q2-box').value || '（未填寫）',
    document.getElementById('q3-box').value || '（未填寫）',
    document.getElementById('q4-box').value || '（未填寫）',
    document.getElementById('q5-box').value || '（未填寫）',
  ];
  const time = new Date().toLocaleString('zh-TW');

  btn.disabled = true;
  btn.textContent = '⏳ 送出中…';

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SHEET_URL;
  form.target = 'hidden-iframe';
  form.style.display = 'none';

  const fields = { fill_time: time, q1: vals[0], q2: vals[1], q3: vals[2], q4: vals[3], q5: vals[4] };
  Object.entries(fields).forEach(([key, val]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = val;
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  setTimeout(() => {
    btn.textContent = '✅ 已送出！';
    btn.style.background = '#88c98a';
    successMsg.style.display = 'block';
  }, 1500);
}
</script>
</body>
</html>
