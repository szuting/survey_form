<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團隊問卷調查</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff;
    min-height: 100vh;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #d47b7b;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 2px;
  }

  .survey-card {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin-bottom: 28px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .survey-card img {
    display: block;
    width: 100%;
    height: auto;
  }

  .text-overlay {
    position: absolute;
    background: rgba(255,255,255,0.0);
    border: none;
    outline: none;
    resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: #4a3f3f;
    line-height: 1.6;
    padding: 8px 10px;
    width: 100%;
    cursor: text;
  }

  .text-overlay::placeholder {
    color: #c9a8a8;
    font-size: 14px;
  }

  .text-overlay:focus {
    background: rgba(255,240,240,0.55);
    border-radius: 8px;
    outline: none;
  }

  /* Per-card overlay positions — percentages relative to card image */
  #q1-box { top: 38%; left: 4%; width: 62%; height: 35%; }
  #q2-box { top: 30%; left: 5%; width: 88%; height: 30%; }
  #q3-box { top: 30%; left: 5%; width: 85%; height: 30%; }
  #q4-box { top: 30%; left: 5%; width: 85%; height: 38%; }
  #q5-box { top: 22%; left: 5%; width: 88%; height: 35%; }

  .btn-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.download-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.download-btn:active {
    transform: scale(0.97);
  }

  .hint {
    font-size: 13px;
    color: #b08080;
    text-align: center;
    margin-bottom: 20px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.submit-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.submit-btn:active { transform: scale(0.97); }

  .success-msg {
    display: none;
    background: #fff0f5;
    border: 1.5px solid #f5a0a0;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 14px;
    color: #c06060;
    text-align: center;
    max-width: 420px;
  }
</style>
</head>
<body>

<h1>✨ 團隊問卷調查 ✨</h1>
<p class="hint">請在每張圖片的空白框內填寫你的答案，完成後按下載儲存 ♡</p>

<!-- Q1 -->
<div class="survey-card" id="card1">
  <img src="S__96526360_0.jpg" alt="問題1：最近最喜歡做的工作內容是什麼？">
  <textarea id="q1-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q2 -->
<div class="survey-card" id="card2">
  <img src="S__96526359_0.jpg" alt="問題2：有沒有什麼事情是你想嘗試的？">
  <textarea id="q2-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q3 -->
<div class="survey-card" id="card3">
  <img src="S__96526358_0.jpg" alt="問題3：有沒有什麼技能是你想培養的？">
  <textarea id="q3-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q4 -->
<div class="survey-card" id="card4">
  <img src="S__96526357_0.jpg" alt="問題4：工作上目前有沒有卡關或需要協助的地方？">
  <textarea id="q4-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q5 -->
<div class="survey-card" id="card5">
  <img src="S__96526356_0.jpg" alt="問題5：還有什麼想跟我分享的？">
  <textarea id="q5-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Thank you image (no input needed) -->
<div class="survey-card" id="card6">
  <img src="S__96526355_0.jpg" alt="謝謝你的分享！">
</div>

<div class="btn-group">
  <button class="submit-btn" onclick="submitSurvey()">📩 送出問卷並寄信</button>
  <div class="success-msg" id="success-msg">
    ✉️ 已開啟郵件程式，請確認後送出！<br>
    <span style="font-size:12px;color:#b08080;">（同時已下載本機備份）</span>
  </div>
</div>

<script>
const TARGET_EMAIL = 'ting1890@ares.com.tw';

function getAnswers() {
  return {
    q1: document.getElementById('q1-box').value,
    q2: document.getElementById('q2-box').value,
    q3: document.getElementById('q3-box').value,
    q4: document.getElementById('q4-box').value,
    q5: document.getElementById('q5-box').value,
  };
}

const QUESTIONS = [
  '1. 最近最喜歡做的工作內容是什麼？',
  '2. 有沒有什麼事情是你想嘗試的？',
  '3. 有沒有什麼技能是你想培養的？',
  '4. 工作上目前有沒有卡關或需要協助的地方？',
  '5. 還有什麼想跟我分享的？',
];

function submitSurvey() {
  const answers = getAnswers();
  const vals = [answers.q1, answers.q2, answers.q3, answers.q4, answers.q5];
  const time = new Date().toLocaleString('zh-TW');

  // Build plain-text email body
  let body = '團隊問卷調查回覆\n';
  body += '填寫時間：' + time + '\n';
  body += '━━━━━━━━━━━━━━━━━━━━\n\n';
  QUESTIONS.forEach((q, i) => {
    body += q + '\n';
    body += (vals[i].trim() || '（未填寫）') + '\n\n';
  });
  body += '━━━━━━━━━━━━━━━━━━━━\n';
  body += '謝謝你的分享！期待未來一起創造更多美好成果 ♡';

  const subject = encodeURIComponent('【團隊問卷回覆】' + time);
  const encodedBody = encodeURIComponent(body);
  window.location.href = 'mailto:' + TARGET_EMAIL + '?subject=' + subject + '&body=' + encodedBody;

  // Also download HTML backup
  downloadHTML(vals, time);

  document.getElementById('success-msg').style.display = 'block';
}

function downloadHTML(vals, time) {
  const rows = QUESTIONS.map((q, i) => `
    <div style="margin-bottom:28px;">
      <div style="font-size:16px;font-weight:700;color:#d47b7b;margin-bottom:8px;">${q}</div>
      <div style="background:#fff0f0;border-radius:12px;padding:14px 16px;font-size:15px;color:#4a3f3f;min-height:60px;white-space:pre-wrap;line-height:1.7;">${escapeHtml(vals[i]) || '<span style="color:#c9a8a8;">（未填寫）</span>'}</div>
    </div>
  `).join('');

  const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>問卷回覆 - 團隊問卷調查</title>
<style>
  body{font-family:'Noto Sans TC',sans-serif;background:#fff8f5;padding:32px 20px;max-width:600px;margin:0 auto;}
  h1{font-size:22px;font-weight:700;color:#d47b7b;text-align:center;margin-bottom:8px;}
  .sub{font-size:13px;color:#b08080;text-align:center;margin-bottom:32px;}
  .footer{text-align:center;color:#c9a8a8;font-size:12px;margin-top:40px;}
</style>
</head>
<body>
<h1>✨ 團隊問卷調查 — 回覆記錄 ✨</h1>
<p class="sub">填寫時間：${time}</p>
${rows}
<div class="footer">謝謝你的分享！期待未來一起創造更多美好成果 ♡</div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '問卷回覆.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
