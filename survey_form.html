<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團隊問卷調查</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff8f5;
    min-height: 100vh;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #d47b7b;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 2px;
  }

  .survey-card {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin-bottom: 28px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .survey-card img {
    display: block;
    width: 100%;
    height: auto;
  }

  .text-overlay {
    position: absolute;
    background: rgba(255,255,255,0.0);
    border: none;
    outline: none;
    resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: #4a3f3f;
    line-height: 1.6;
    padding: 8px 10px;
    width: 100%;
    cursor: text;
  }

  .text-overlay::placeholder {
    color: #c9a8a8;
    font-size: 14px;
  }

  .text-overlay:focus {
    background: rgba(255,240,240,0.55);
    border-radius: 8px;
    outline: none;
  }

  /* Per-card overlay positions — percentages relative to card image */
  #q1-box { top: 38%; left: 4%; width: 62%; height: 35%; }
  #q2-box { top: 30%; left: 5%; width: 88%; height: 30%; }
  #q3-box { top: 30%; left: 5%; width: 85%; height: 30%; }
  #q4-box { top: 30%; left: 5%; width: 85%; height: 38%; }
  #q5-box { top: 22%; left: 5%; width: 88%; height: 35%; }

  .btn-wrap {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.download-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.download-btn:active {
    transform: scale(0.97);
  }

  .hint {
    font-size: 13px;
    color: #b08080;
    text-align: center;
    margin-bottom: 20px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 12px;
  }

  button.submit-btn {
    background: #f5a0a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245,160,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  button.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(245,160,160,0.5);
  }

  button.submit-btn:active { transform: scale(0.97); }

  .success-msg {
    display: none;
    background: #fff0f5;
    border: 1.5px solid #f5a0a0;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 14px;
    color: #c06060;
    text-align: center;
    max-width: 420px;
  }
</style>
</head>
<body>

<h1>✨ 團隊問卷調查 ✨</h1>
<p class="hint">請在每張圖片的空白框內填寫你的答案，完成後按下載儲存 ♡</p>

<!-- Q1 -->
<div class="survey-card" id="card1">
  <img src="S__96526360_0.jpg" alt="問題1：最近最喜歡做的工作內容是什麼？">
  <textarea id="q1-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q2 -->
<div class="survey-card" id="card2">
  <img src="S__96526359_0.jpg" alt="問題2：有沒有什麼事情是你想嘗試的？">
  <textarea id="q2-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q3 -->
<div class="survey-card" id="card3">
  <img src="S__96526358_0.jpg" alt="問題3：有沒有什麼技能是你想培養的？">
  <textarea id="q3-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q4 -->
<div class="survey-card" id="card4">
  <img src="S__96526357_0.jpg" alt="問題4：工作上目前有沒有卡關或需要協助的地方？">
  <textarea id="q4-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Q5 -->
<div class="survey-card" id="card5">
  <img src="S__96526356_0.jpg" alt="問題5：還有什麼想跟我分享的？">
  <textarea id="q5-box" class="text-overlay" placeholder="請輸入你的答案…"></textarea>
</div>

<!-- Thank you image (no input needed) -->
<div class="survey-card" id="card6">
  <img src="S__96526355_0.jpg" alt="謝謝你的分享！">
</div>

<div class="btn-group">
  <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">📨 送出問卷</button>
  <div class="success-msg" id="success-msg">🎉 答案已成功送出到 Google 試算表！謝謝你的分享 ♡</div>
  <div class="success-msg" id="error-msg" style="border-color:#e08080;background:#fff5f5;color:#c05050;">❌ 送出失敗，請檢查網路後再試一次。</div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyobaJQLglClIved1ESectzHshSuhXtibYSAhxPLExPcELPAuDknpIHcfxJK6BNgW1nyA/exec';

const QUESTIONS = [
  '1. 最近最喜歡做的工作內容是什麼？',
  '2. 有沒有什麼事情是你想嘗試的？',
  '3. 有沒有什麼技能是你想培養的？',
  '4. 工作上目前有沒有卡關或需要協助的地方？',
  '5. 還有什麼想跟我分享的？',
];

async function submitSurvey() {
  const btn = document.getElementById('submit-btn');
  const successMsg = document.getElementById('success-msg');
  const errorMsg = document.getElementById('error-msg');

  const vals = [
    document.getElementById('q1-box').value,
    document.getElementById('q2-box').value,
    document.getElementById('q3-box').value,
    document.getElementById('q4-box').value,
    document.getElementById('q5-box').value,
  ];

  const time = new Date().toLocaleString('zh-TW');

  btn.disabled = true;
  btn.textContent = '⏳ 送出中…';
  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';

  const payload = {
    fill_time: time,
    q1: vals[0] || '（未填寫）',
    q2: vals[1] || '（未填寫）',
    q3: vals[2] || '（未填寫）',
    q4: vals[3] || '（未填寫）',
    q5: vals[4] || '（未填寫）',
  };

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    btn.textContent = '✅ 已送出！';
    btn.style.background = '#88c98a';
    successMsg.style.display = 'block';

  } catch (err) {
    btn.disabled = false;
    btn.textContent = '📨 送出問卷';
    errorMsg.style.display = 'block';
  }
}
</script>
</body>
</html>
